<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IGI Board Meeting</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,500&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#143554;--teal:#6DFAFA;--cadet:#8898AB;}
html,body{height:100%;margin:0;}
body{background:var(--navy);font-family:'Nunito Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;color:#fff;}
.gate{background:#fff;color:var(--navy);max-width:420px;width:90%;border-radius:16px;padding:38px 32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.gate img{height:40px;margin-bottom:16px;}
.gate h1{font-family:'Lora',serif;font-size:22px;margin:0 0 4px;text-transform:uppercase;letter-spacing:.5px;}
.gate p{color:var(--cadet);font-size:14px;margin:0 0 20px;}
.gate input{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid #cfd8e0;border-radius:10px;margin-bottom:12px;font-family:inherit;}
.gate input:focus{outline:none;border-color:var(--navy);}
.gate button{width:100%;padding:12px;font-size:16px;font-weight:700;color:#fff;background:var(--navy);border:0;border-radius:10px;cursor:pointer;font-family:inherit;}
.gate button:hover{background:#1c4a72;}
.err{color:#b3261e;font-size:13px;margin-top:12px;min-height:16px;}
.hint{color:var(--cadet);font-size:12px;margin-top:14px;}
</style></head>

  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent="";
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
